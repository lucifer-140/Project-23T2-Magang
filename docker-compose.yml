version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: uph_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: uph_admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: uph_gotenberg
    restart: always
    ports:
      - "3001:3000"
    command:
      - "gotenberg"
      - "--api-port=3000"

volumes:
  postgres_data:
