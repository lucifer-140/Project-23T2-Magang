<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar — Portal Akademik</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
</head>
<body>
  <div class="auth-bg">
    <div class="auth-card wide">
      <div class="accent-bar"></div>

      <!-- Logo -->
      <div class="logo-block">
        <img src="Logo UPH.png" alt="Logo" width="72" height="72"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <div class="logo-fallback" style="display:none">
          <i data-lucide="graduation-cap" width="28" height="28"></i>
        </div>
        <h1>Buat Akun</h1>
        <span class="subtitle">Daftar sebagai pengguna baru</span>
      </div>

      <div class="divider"></div>

      <!-- Alerts -->
      <div id="signup-alert" class="alert alert-error hidden" role="alert">
        <i data-lucide="alert-circle" width="16" height="16"></i>
        <span></span>
      </div>

      <form id="signup-form" novalidate onsubmit="handleSignup(event)">
        <div class="field">
          <label for="signup-name">Nama Lengkap</label>
          <input
            type="text"
            id="signup-name"
            name="name"
            placeholder="Dr. Budi Santoso"
            autocomplete="name"
            required
          />
        </div>

        <div class="field">
          <label for="signup-email">Email Institusi</label>
          <input
            type="email"
            id="signup-email"
            name="email"
            placeholder="nama@university.ac.id"
            autocomplete="email"
            required
          />
        </div>

        <div class="field">
          <label for="signup-role">Jabatan</label>
          <select id="signup-role" name="role">
            <option value="DOSEN">Dosen</option>
            <option value="KOORDINATOR">Koordinator</option>
            <option value="KAPRODI">Kepala Program Studi</option>
          </select>
        </div>

        <div class="field">
          <label for="signup-password">Password</label>
          <input
            type="password"
            id="signup-password"
            name="password"
            placeholder="Minimal 8 karakter"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="field">
          <label for="signup-confirm">Konfirmasi Password</label>
          <input
            type="password"
            id="signup-confirm"
            name="confirm"
            placeholder="Ulangi password"
            autocomplete="new-password"
            required
          />
        </div>

        <button type="submit" class="btn btn-red">
          <i data-lucide="user-plus" width="18" height="18"></i>
          Daftar
        </button>
        <a href="index.html" class="btn btn-ghost" style="margin-top:0.5rem;text-align:center">
          Sudah punya akun? Masuk
        </a>
      </form>

      <p class="auth-copyright">
        &copy; 2026 <strong>Your Organization</strong>. All rights reserved.
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => lucide.createIcons());

    // Override handleSignup to update alert span text
    const _origSignup = handleSignup;
    function handleSignup(event) {
      event.preventDefault();
      const password = document.getElementById('signup-password').value;
      const confirm  = document.getElementById('signup-confirm').value;
      const alertEl  = document.getElementById('signup-alert');
      const span     = alertEl.querySelector('span');

      alertEl.classList.add('hidden');

      if (password !== confirm) {
        span.textContent = 'Password tidak cocok. Silakan coba lagi.';
        alertEl.classList.remove('hidden');
        return;
      }
      if (password.length < 8) {
        span.textContent = 'Password minimal 8 karakter.';
        alertEl.classList.remove('hidden');
        return;
      }
      window.location.href = 'lobby.html';
    }
  </script>
</body>
</html>
