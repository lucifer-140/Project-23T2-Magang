<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lupa Password — Portal Akademik</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
</head>
<body>
  <div class="auth-bg">
    <div class="auth-card" style="max-width:400px">
      <div class="accent-bar"></div>

      <!-- Logo -->
      <div class="logo-block">
        <img src="Logo UPH.png" alt="Logo" width="72" height="72"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <div class="logo-fallback" style="display:none">
          <i data-lucide="graduation-cap" width="28" height="28"></i>
        </div>
        <h1>Reset Password</h1>
        <span class="subtitle">Masukkan email terdaftar Anda</span>
      </div>

      <div class="divider"></div>

      <!-- Success message (hidden until form submit) -->
      <div id="forgot-success" class="alert alert-success hidden" role="alert">
        <i data-lucide="check-circle" width="16" height="16"></i>
        <span>Link reset password telah dikirim ke email Anda.</span>
      </div>

      <form id="forgot-form" novalidate onsubmit="handleForgot(event)">
        <div class="field">
          <label for="forgot-email">Email</label>
          <input
            type="email"
            id="forgot-email"
            name="email"
            placeholder="email@example.com"
            autocomplete="email"
            required
          />
        </div>

        <button type="submit" class="btn btn-red">
          <i data-lucide="send" width="18" height="18"></i>
          Kirim Link Reset
        </button>
        <a href="index.html" class="btn btn-ghost" style="text-align:center;margin-top:0.5rem">
          Kembali ke Login
        </a>
      </form>

      <p class="auth-copyright">
        &copy; 2026 <strong>Your Organization</strong>. All rights reserved.
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
  </script>
</body>
</html>
