<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk — Portal Akademik</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
</head>
<body>
  <div class="auth-bg">
    <div class="auth-card">
      <div class="accent-bar"></div>

      <!-- Logo -->
      <div class="logo-block">
        <img src="Logo UPH.png" alt="Logo" width="88" height="88"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <div class="logo-fallback" style="display:none">
          <i data-lucide="graduation-cap" width="32" height="32"></i>
        </div>
        <h1>Portal Akademik</h1>
        <span class="subtitle">Sistem Administrasi</span>
      </div>

      <div class="divider"></div>

      <!-- Error alert -->
      <div id="login-alert" class="alert alert-error hidden" role="alert">
        <i data-lucide="alert-circle" width="16" height="16"></i>
        <span></span>
      </div>

      <form id="login-form" novalidate onsubmit="handleLogin(event)">
        <div class="field">
          <label for="login-email">Email</label>
          <input
            type="email"
            id="login-email"
            name="email"
            placeholder="dosen@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="field">
          <label for="login-password">Password</label>
          <input
            type="password"
            id="login-password"
            name="password"
            placeholder="Masukkan password Anda"
            autocomplete="current-password"
            required
          />
          <div class="field-hint">
            <a href="forgot-password.html">Lupa password?</a>
          </div>
        </div>

        <button type="submit" class="btn btn-red">
          <i data-lucide="log-in" width="18" height="18"></i>
          Masuk
        </button>
      </form>

      <p class="auth-footer">
        Belum punya akun?
        <a href="signup.html">Daftar sekarang</a>
      </p>

      <!-- Demo accounts — remove in production -->
      <div class="demo-hint">
        <p>Akun Demo — klik untuk isi otomatis</p>
        <div class="demo-grid">
          <button onclick="fillLogin('admin@test.com','admin123')">admin@test.com</button>
          <button onclick="fillLogin('kaprodi@test.com','kaprodi123')">kaprodi@test.com</button>
          <button onclick="fillLogin('koordinator@test.com','koordinator123')">koordinator@test.com</button>
          <button onclick="fillLogin('dosen@test.com','dosen123')">dosen@test.com</button>
        </div>
      </div>

      <p class="auth-copyright">
        &copy; 2026 <strong>Your Organization</strong>. All rights reserved.
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Redirect to dashboard if already logged in
    if (getSession()) window.location.href = 'dashboard.html';
    document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
  </script>
</body>
</html>
